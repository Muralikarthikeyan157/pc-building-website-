<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products | PC Builder Pro</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/builder.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="loading-screen"><div class="loader-rgb"></div><div class="loading-text">LOADING</div></div>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo"><div class="logo-icon">⚡</div>PC Builder Pro</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="builder.html">Builder</a>
        <a href="products.html" class="active">Products</a>
        <a href="compare.html">Compare</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="nav-actions">
        <a href="wishlist.html" class="nav-icon-btn">❤️<span class="badge-count wishlist-badge" style="display:none">0</span></a>
        <a href="compare.html" class="nav-icon-btn">⚖️<span class="badge-count compare-badge" style="display:none">0</span></a>
        <a href="saved-builds.html" class="nav-icon-btn">💾</a>
        <button class="theme-toggle">🌙</button>
        <button class="menu-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>
  <div class="mobile-menu">
    <a href="index.html">Home</a><a href="builder.html">PC Builder</a><a href="products.html">Products</a>
    <a href="compare.html">Compare</a><a href="wishlist.html">Wishlist</a><a href="saved-builds.html">Saved Builds</a>
    <a href="about.html">About</a><a href="contact.html">Contact</a>
  </div>

  <div class="page-header">
    <div class="container">
      <h1>Product Catalog</h1>
      <p>Browse hundreds of PC components and peripherals</p>
    </div>
  </div>

  <div class="container products-layout">
    <aside class="filters-panel" id="filters-panel"></aside>

    <main>
      <div class="products-toolbar">
        <div class="search-bar" style="max-width:400px;flex:1">
          <span class="search-icon">🔍</span>
          <input type="text" id="products-search" placeholder="Search by brand, series, socket...">
        </div>
        <button class="btn btn-secondary btn-sm" id="mobile-filter-toggle">Filters</button>
        <select class="sort-select" id="sort-select">
          <option value="rating">Top Rated</option>
          <option value="price-low">Price: Low to High</option>
          <option value="price-high">Price: High to Low</option>
          <option value="name">Name A-Z</option>
        </select>
      </div>

      <div class="category-tabs" id="category-tabs"></div>

      <p class="products-count" id="products-count">Loading products...</p>

      <div class="products-grid" id="products-grid"></div>
    </main>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border:none">
        <span>&copy; 2026 PC Builder Pro. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <div class="modal-overlay" id="product-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Product Details</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="js/images.js"></script>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/compatibility.js"></script>
  <script src="js/search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
