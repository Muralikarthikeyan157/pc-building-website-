<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/builder.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="loading-screen"><div class="loader-rgb"></div><div class="loading-text">LOADING</div></div>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo"><div class="logo-icon">⚡</div>PC Builder Pro</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="builder.html">Builder</a>
        <a href="products.html">Products</a>
        <a href="compare.html" class="active">Compare</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="nav-actions">
        <a href="wishlist.html" class="nav-icon-btn">❤️<span class="badge-count wishlist-badge" style="display:none">0</span></a>
        <a href="compare.html" class="nav-icon-btn">⚖️<span class="badge-count compare-badge" style="display:none">0</span></a>
        <a href="saved-builds.html" class="nav-icon-btn">💾</a>
        <button class="theme-toggle">🌙</button>
        <button class="menu-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>
  <div class="mobile-menu">
    <a href="index.html">Home</a><a href="builder.html">PC Builder</a><a href="products.html">Products</a>
    <a href="compare.html">Compare</a><a href="wishlist.html">Wishlist</a><a href="saved-builds.html">Saved Builds</a>
    <a href="about.html">About</a><a href="contact.html">Contact</a>
  </div>

  <div class="page-header">
    <div class="container">
      <h1>⚖️ Compare Products</h1>
      <p>Compare up to 4 products side-by-side</p>
    </div>
  </div>

  <div class="container" style="padding-bottom:60px">
    <div class="compare-category-select">
      <select id="compare-category">
        <option value="cpu">CPUs</option>
        <option value="gpu">Graphics Cards</option>
        <option value="motherboard">Motherboards</option>
        <option value="ram">RAM</option>
        <option value="ssd">SSD</option>
        <option value="psu">Power Supplies</option>
        <option value="monitor">Monitors</option>
      </select>
    </div>

    <div class="flex justify-between items-center mb-3">
      <p class="text-muted">Add products to compare slots below</p>
      <button class="btn btn-secondary btn-sm" id="clear-compare">Clear All</button>
    </div>

    <div class="compare-slots" id="compare-slots"></div>

    <div id="compare-table-container"></div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border:none">
        <span>&copy; 2026 PC Builder Pro</span>
      </div>
    </div>
  </footer>

  <div class="modal-overlay" id="product-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Select Product</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="js/images.js"></script>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/compatibility.js"></script>
  <script src="js/search.js"></script>
  <script src="js/compare.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
